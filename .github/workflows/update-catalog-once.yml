name: update-catalog-once

on:
  push:
    branches:
      - agent-learning-layer-triage

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Regenerate catalog
        run: python scripts/generate_catalog.py
      - name: Remove one-time workflow
        run: rm .github/workflows/update-catalog-once.yml
      - name: Commit generated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CATALOG.md docs/catalog.json .github/workflows/update-catalog-once.yml
          git diff --cached --quiet || git commit -m "Regenerate skill catalog"
          git push
