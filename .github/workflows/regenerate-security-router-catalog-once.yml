name: Regenerate Security Router Catalog Once

on:
  push:
    branches:
      - authorized-security-router
    paths:
      - '.github/workflows/regenerate-security-router-catalog-once.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: authorized-security-router
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Update README and regenerate catalog
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text()

          text = text.replace(
              '| Debug from evidence | `diagnose` | The agent keeps guessing fixes without reproducing the failure and verifying the result. |\n| Save tokens in shell-heavy work |',
              '| Debug from evidence | `diagnose` | The agent keeps guessing fixes without reproducing the failure and verifying the result. |\n| Route authorized security work | `authorized-security-router` | The task involves defensive security review, reverse-analysis triage, or security issue intake and needs clear scope before tools. |\n| Save tokens in shell-heavy work |',
          )

          text = text.replace(
              '- **Need to debug a repo?** Start with `diagnose`, `repo-debugging-ledger`, and `graph-guided-code-reading`.\n- **Need the smallest correct implementation path?**',
              '- **Need to debug a repo?** Start with `diagnose`, `repo-debugging-ledger`, and `graph-guided-code-reading`.\n- **Need to route authorized security work?** Start with `authorized-security-router`, then pair it with `evidence-ledger-research`, `repo-issue-triage`, `browser-verification`, or `web-quality-audit` depending on the target.\n- **Need the smallest correct implementation path?**',
          )

          text = text.replace(
              '| `evidence-ledger-research` | Keeps claims, sources, calculations, and open questions in a disciplined evidence ledger. |\n| `loopops-protocol` |',
              '| `evidence-ledger-research` | Keeps claims, sources, calculations, and open questions in a disciplined evidence ledger. |\n| `authorized-security-router` | Routes authorized defensive security and reverse-analysis work by scope, target type, intent, and toolchain before taking action. |\n| `loopops-protocol` |',
          )

          path.write_text(text)
          PY
          python scripts/generate_catalog.py
          python scripts/validate.py
      - name: Remove one-time workflow
        run: rm .github/workflows/regenerate-security-router-catalog-once.yml
      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CATALOG.md docs/catalog.json .github/workflows/regenerate-security-router-catalog-once.yml
          git diff --cached --quiet || git commit -m "Document authorized security router and regenerate catalog"
          git push
