name: regenerate-catalog-consolidation-once

on:
  push:
    branches:
      - consolidate-skill-prs-34-39

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: consolidate-skill-prs-34-39
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip pyyaml
      - run: python scripts/generate_catalog.py
      - run: python scripts/validate.py
      - name: Commit regenerated catalog and remove helper
        run: |
          rm .github/workflows/regenerate-catalog-consolidation-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/catalog.json CATALOG.md .github/workflows/regenerate-catalog-consolidation-once.yml
          git commit -m "Regenerate catalog for consolidated skill additions" || exit 0
          git push
