name: Regenerate catalog once

on:
  push:
    branches:
      - motion-review-gate

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: motion-review-gate
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e .
      - name: Regenerate catalog
        run: |
          python scripts/generate_catalog.py
          python scripts/validate.py
      - name: Remove one-time workflow
        run: rm .github/workflows/regenerate-catalog-once.yml
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/catalog.json CATALOG.md .github/workflows/regenerate-catalog-once.yml
          if git diff --cached --quiet; then
            echo "No catalog changes to commit"
          else
            git commit -m "Regenerate catalog for motion review gate"
            git push
          fi
