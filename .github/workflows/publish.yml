name: publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Target package index"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install .
      - run: python -m pip install git+https://github.com/NVIDIA/SkillSpector.git
      - run: abvx-skills audit-security ./skills --no-llm --output-dir artifacts/skillspector
      - run: |
          set +e
          skillspector scan ./skills --format sarif --output artifacts/skillspector.sarif --no-llm
          status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
            exit "$status"
          fi
          exit 0
        shell: bash
      - run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("artifacts/skillspector.sarif")
          data = json.loads(path.read_text(encoding="utf-8"))
          for run in data.get("runs", []):
              for result in run.get("results", []):
                  for location in result.get("locations", []):
                      artifact = location.get("physicalLocation", {}).get("artifactLocation", {})
                      uri = artifact.get("uri")
                      if isinstance(uri, str) and uri and not uri.startswith(("skills/", "/", "file:")):
                          artifact["uri"] = f"skills/{uri}"
          path.write_text(json.dumps(data, indent=2), encoding="utf-8")
          PY
      - run: >-
          python scripts/evaluate_skillspector.py
          --reports-dir artifacts/skillspector
          --policy .abvx/skillspector-policy.yaml
          --baseline .abvx/skillspector-baseline.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: publish-skillspector-reports
          path: |
            artifacts/skillspector/*.json
            artifacts/skillspector.sarif

  build:
    needs: security-preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/abvx-agent-skills
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/abvx-agent-skills
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
