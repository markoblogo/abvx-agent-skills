<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Architecture Example</title>
<script>
  (function () {
    const saved = localStorage.getItem('theme');
    const dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.classList.toggle('dark', dark);
  })();
</script>
<style>
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --surface-2: #f0eee6;
    --ink: #141413;
    --body: #3d3d3a;
    --muted: #87867f;
    --line: #d1cfc5;
    --accent: #d97757;
    --accent-soft: rgba(217, 119, 87, 0.12);
    --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
    --serif: Georgia, "Times New Roman", serif;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  html.dark {
    --bg: #141413;
    --surface: #1f1f1d;
    --surface-2: #2a2a28;
    --ink: #faf9f5;
    --body: #d1cfc5;
    --muted: #9a988f;
    --line: #3d3d3a;
    --accent: #e48a6e;
    --accent-soft: rgba(228, 138, 110, 0.16);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--body);
    font: 15px/1.5 var(--sans);
  }
  .top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
  }
  h1 {
    margin: 0;
    color: var(--ink);
    font: 500 28px/1.1 var(--serif);
  }
  .sub {
    font: 11px/1.4 var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  button {
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    padding: 8px 10px;
    font: 11px var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 20px;
    padding: 20px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--surface);
  }
  .panel {
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--surface);
    padding: 16px;
  }
  .panel h2 {
    margin: 0 0 8px;
    color: var(--ink);
    font: 500 20px/1.2 var(--serif);
  }
  .panel p {
    margin: 0 0 12px;
  }
  .chip {
    display: inline-block;
    padding: 5px 9px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font: 11px var(--mono);
    color: var(--muted);
  }
  .zone { fill: var(--surface-2); stroke: var(--line); stroke-dasharray: 6 5; }
  .node { fill: var(--surface); stroke: var(--line); }
  .node-accent { fill: var(--accent-soft); stroke: var(--accent); }
  .label { fill: var(--ink); font: 600 14px var(--sans); }
  .meta { fill: var(--muted); font: 11px var(--mono); }
  .edge { fill: none; stroke: var(--muted); stroke-width: 2; marker-end: url(#arrow); }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="top">
    <div>
      <h1>Artifact example</h1>
      <div class="sub">zones, flows, concise labels</div>
    </div>
    <button id="themeToggle" type="button">Theme</button>
  </div>
  <main>
    <svg viewBox="0 0 980 560" role="img" aria-label="Example architecture diagram">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" style="fill: var(--muted)"></path>
        </marker>
      </defs>
      <rect class="zone" x="40" y="60" width="220" height="420" rx="18"></rect>
      <rect class="zone" x="320" y="60" width="280" height="420" rx="18"></rect>
      <rect class="zone" x="660" y="60" width="260" height="420" rx="18"></rect>
      <text class="meta" x="60" y="92">Clients</text>
      <text class="meta" x="340" y="92">App Layer</text>
      <text class="meta" x="680" y="92">Storage + Jobs</text>

      <rect class="node" x="70" y="140" width="150" height="72" rx="12"></rect>
      <text class="label" x="92" y="172">Web UI</text>
      <text class="meta" x="92" y="194">human-triggered</text>

      <rect class="node-accent" x="380" y="140" width="170" height="80" rx="12"></rect>
      <text class="label" x="404" y="173">API Worker</text>
      <text class="meta" x="404" y="197">auth, shaping, routing</text>

      <rect class="node" x="390" y="286" width="150" height="72" rx="12"></rect>
      <text class="label" x="414" y="318">Flow Gate</text>
      <text class="meta" x="414" y="340">sequence control</text>

      <rect class="node" x="710" y="140" width="160" height="72" rx="12"></rect>
      <text class="label" x="734" y="172">Database</text>
      <text class="meta" x="734" y="194">source of truth</text>

      <rect class="node" x="710" y="286" width="160" height="72" rx="12"></rect>
      <text class="label" x="734" y="318">Worker Queue</text>
      <text class="meta" x="734" y="340">async fan-out</text>

      <path class="edge" d="M220 176 C 280 176, 320 180, 380 180"></path>
      <path class="edge" d="M465 220 L465 286"></path>
      <path class="edge" d="M550 180 C 610 180, 650 176, 710 176"></path>
      <path class="edge" d="M540 322 C 620 322, 650 322, 710 322"></path>
    </svg>

    <section class="panel">
      <h2>What this demonstrates</h2>
      <p>A good artifact is single-file, easy to share, visually calm, and focused on one mental model.</p>
      <p><span class="chip">SVG-first</span> <span class="chip">minimal prose</span> <span class="chip">theme-aware</span></p>
    </section>
  </main>
<script>
  const root = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  toggle.addEventListener('click', function () {
    root.classList.toggle('dark');
    localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light');
  });
</script>
</body>
</html>
